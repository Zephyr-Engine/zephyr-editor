name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container: jackpar/x11-zig:0.16.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # build.zig.zon deliberately uses ../zephyr-runtime during development.
      # Recreate that sibling layout in CI with the current default branch.
      - name: Checkout zephyr-runtime
        run: git clone --depth 1 https://github.com/Zephyr-Engine/zephyr-runtime.git ../zephyr-runtime

      - name: Build project
        run: zig build
